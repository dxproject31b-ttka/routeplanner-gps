<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GPS Position Locator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --app-height: 100vh; }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #111b27;
            color: #e8eaed;
            height: var(--app-height);
        }
        .portal-ring {
            border: 4px solid rgba(138, 180, 248, 0.1);
            border-top: 4px solid #8ab4f8;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            animation: spin 1.2s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="overflow-hidden flex flex-col items-center justify-center p-6 text-center select-none">
    
    <div id="loader" class="flex flex-col items-center gap-4">
        <div class="portal-ring"></div>
        <p class="text-sm font-semibold text-gray-400 animate-pulse">กำลังประมวลผลพิกัดความแม่นยำสูง...</p>
    </div>

    <div id="status" class="hidden flex flex-col items-center gap-4 max-w-sm">
        <div class="w-16 h-16 bg-green-500/10 text-green-400 border border-green-500/20 rounded-full flex items-center justify-center shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <h2 class="text-lg font-bold">แชร์พิกัดสำเร็จแล้ว</h2>
        <p class="text-xs text-gray-400">ระบบส่งค่าพิกัดไปยังแอปพลิเคชันเรียบร้อยแล้ว หน้าต่างนี้จะปิดตัวลงอัตโนมัติ</p>
        <button onclick="window.close()" class="mt-4 px-6 py-2.5 bg-blue-500 hover:bg-blue-600 active:scale-95 text-white rounded text-xs font-bold transition-all shadow-sm">
            ปิดหน้านี้
        </button>
    </div>

    <div id="error-status" class="hidden flex flex-col items-center gap-4 max-w-sm">
        <div class="w-16 h-16 bg-red-500/10 text-red-400 border border-red-500/20 rounded-full flex items-center justify-center shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
        <h2 class="text-lg font-bold text-red-400">เข้าถึงพิกัดไม่สำเร็จ</h2>
        <p id="error-text" class="text-xs text-gray-400">กรุณาอนุญาตให้สิทธิ์เข้าถึงพิกัดตำแหน่งในระบบของเบราว์เซอร์</p>
        <button onclick="requestGps()" class="mt-2 px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded text-xs font-bold transition-all shadow-sm">
            ลองใหม่อีกครั้ง
        </button>
    </div>

    <script>
        function recalculateHeight() {
            document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        window.addEventListener('resize', recalculateHeight);
        window.addEventListener('orientationchange', recalculateHeight);
        recalculateHeight();

        function requestGps() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('status').classList.add('hidden');
            document.getElementById('error-status').classList.add('hidden');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        var lat = position.coords.latitude;
                        var lng = position.coords.longitude;
                        var payload = { lat: lat, lng: lng, success: true };
                        
                        // ส่งข้อความความปลอดภัยด้วย PostMessage ไปยังหน้าหลัก
                        if (window.opener) {
                            window.opener.postMessage({ type: 'GPS_CAPTURE', data: payload }, '*');
                        }
                        
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('status').classList.remove('hidden');
                        
                        setTimeout(function() {
                            window.close();
                        }, 1200);
                    },
                    function(error) {
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('error-status').classList.remove('hidden');
                        var errMsg = "ไม่สามารถเรียกข้อมูลตำแหน่งจากอุปกรณ์ได้";
                        if (error.code === error.PERMISSION_DENIED) {
                            errMsg = "สิทธิ์ GPS ถูกปฏิเสธ กรุณาเปิดสิทธิ์ระบุตำแหน่งในเบราว์เซอร์ของท่าน";
                        }
                        document.getElementById('error-text').innerText = errMsg;
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            } else {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('error-status').classList.remove('hidden');
                document.getElementById('error-text').innerText = "อุปกรณ์นี้ไม่สนับสนุนระบบ Geolocation";
            }
        }
        window.onload = requestGps;
    </script>
</body>
</html>
